<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import { 
  getAuth, 
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import { 
  getFirestore, 
  collection, 
  addDoc, 
  onSnapshot, 
  query, 
  orderBy 
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDHjtwG2NTPOECYQ3AOarLnfS4IDKn6RDw",
  authDomain: "c--services.firebaseapp.com",
  projectId: "c--services",
  storageBucket: "c--services.firebasestorage.app",
  messagingSenderId: "1042980684705",
  appId: "1:1042980684705:web:213fa218e9b547cdee81e0",
  measurementId: "G-R51B4T08SF"
};

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ===== AUTH =====
window.register = async () => {
  await createUserWithEmailAndPassword(auth, email.value, password.value);
};

window.login = async () => {
  await signInWithEmailAndPassword(auth, email.value, password.value);
};

window.logout = () => signOut(auth);

// ===== SESSION =====
onAuthStateChanged(auth, user => {
  if(user){
    auth.style.display = "none";
    appSection.style.display = "block";
    loadPosts();
  } else {
    auth.style.display = "block";
    appSection.style.display = "none";
  }
});

// ===== POSTS =====
window.addPost = async () => {
  await addDoc(collection(db, "posts"), {
    text: postInput.value,
    date: Date.now()
  });
};

function loadPosts() {
  const q = query(collection(db, "posts"), orderBy("date", "desc"));
  onSnapshot(q, snapshot => {
    posts.innerHTML = "";
    snapshot.forEach(doc => {
      posts.innerHTML += `<div>${doc.data().text}</div>`;
    });
  });
}
</script>
