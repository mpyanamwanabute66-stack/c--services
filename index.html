<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogGPT Pro</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: white;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: #020617;
    position: sticky;
    top: 0;
}

.logo {
    color: #38bdf8;
    font-weight: bold;
}

nav {
    display: flex;
    gap: 20px;
}

nav a {
    color: white;
    text-decoration: none;
}

.menu-btn {
    display: none;
    font-size: 22px;
    cursor: pointer;
}

/* HERO */
.hero {
    text-align: center;
    padding: 80px 20px;
    background: linear-gradient(to right, #1e293b, #020617);
}

.hero h1 {
    font-size: 45px;
}

.hero p {
    margin: 20px 0;
}

.hero button {
    padding: 12px 25px;
    background: #38bdf8;
    border: none;
    cursor: pointer;
}

/* SEARCH */
.search {
    text-align: center;
    margin: 20px;
}

.search input {
    width: 60%;
    padding: 10px;
    border-radius: 5px;
    border: none;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 30px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* DASHBOARD */
.dashboard {
    display: none;
    padding: 30px;
}

.stats {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.stat {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #020617;
}

/* MOBILE */
@media(max-width: 768px) {
    nav {
        display: none;
        flex-direction: column;
        background: #020617;
        position: absolute;
        top: 60px;
        right: 0;
        width: 200px;
    }

    nav.active {
        display: flex;
    }

    .menu-btn {
        display: block;
    }
}
</style>
</head>

<body>

<header>
    <div class="logo">LogGPT</div>
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <nav id="menu">
        <a href="#">Accueil</a>
        <a href="#" onclick="openDashboard()">Dashboard</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>Plateforme intelligente</h1>
    <p>Créer, gérer et évoluer dans le digital</p>
    <button onclick="notify()">Commencer</button>
</section>

<div class="search">
    <input type="text" id="search" placeholder="Rechercher un service..." onkeyup="filter()">
</div>

<section class="grid" id="grid"></section>

<section class="dashboard" id="dashboard">
    <h2>Dashboard</h2>
    <div class="stats">
        <div class="stat">👤 Utilisateur: Actif</div>
        <div class="stat">📊 Services: 100</div>
        <div class="stat">💬 Messages: 5</div>
    </div>
</section>

<footer>
    <p>© 2026 LogGPT Pro</p>
</footer>

<script>
// MENU MOBILE
function toggleMenu() {
    document.getElementById("menu").classList.toggle("active");
}

// NOTIFICATION
function notify() {
    alert("Bienvenue sur LogGPT Pro 🚀");
}

// DASHBOARD
function openDashboard() {
    document.getElementById("dashboard").style.display = "block";
    window.scrollTo(0, document.body.scrollHeight);
}

// SERVICES
const grid = document.getElementById("grid");

let services = [];

for(let i = 1; i <= 100; i++) {
    services.push("Service " + i);
}

function display(list) {
    grid.innerHTML = "";
    list.forEach((s, i) => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <h3>${s}</h3>
            <p>Description professionnelle du ${s}</p>
            <button onclick="alert('${s}')">Voir</button>
        `;
        grid.appendChild(card);
    });
}

display(services);

// RECHERCHE
function filter() {
    let val = document.getElementById("search").value.toLowerCase();
    let filtered = services.filter(s => s.toLowerCase().includes(val));
    display(filtered);
}
</script>

</body>
</html>
