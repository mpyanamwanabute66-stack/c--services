<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogGPT Platform</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

header {
    background: #020617;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h1 {
    color: #38bdf8;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
}

.hero {
    text-align: center;
    padding: 100px 20px;
    background: linear-gradient(to right, #1e293b, #020617);
}

.hero h2 {
    font-size: 40px;
}

.hero button {
    padding: 15px 30px;
    background: #38bdf8;
    border: none;
    cursor: pointer;
    margin-top: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 40px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

footer {
    text-align: center;
    padding: 20px;
    background: #020617;
}
</style>
</head>

<body>

<header>
    <h1>LogGPT</h1>
    <nav>
        <a href="#">Accueil</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Plateforme intelligente & moderne</h2>
    <p>Crée ton futur digital avec une interface puissante</p>
    <button onclick="alert('Bienvenue sur LogGPT 🚀')">Commencer</button>
</section>

<section class="grid" id="grid"></section>

<footer>
    <p>© 2026 LogGPT - Tous droits réservés</p>
</footer>

<script>
// Génération automatique de 100 services
const grid = document.getElementById("grid");

for(let i = 1; i <= 100; i++) {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <h3>Service ${i}</h3>
        <p>Description du service numéro ${i}. Plateforme intelligente.</p>
        <button onclick="voir(${i})">Voir plus</button>
    `;

    grid.appendChild(card);
}

function voir(id) {
    alert("Service " + id + " sélectionné !");
}
</script>

</body>
</html>
